<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinFights</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --panel-bg: #131922;
            --accent: #00ff66;
            --text-main: #ffffff;
            --text-muted: #627286;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); margin:0; padding-bottom: 80px; }
        
        /* Live Drops Lentasining To'g'ri Dizayni */
        .live-drops { display: flex; gap: 10px; overflow-x: auto; padding: 10px; background: #0f141c; border-bottom: 1px solid #1e2530; }
        .live-drops::-webkit-scrollbar { display: none; }
        .drop-card { min-width: 100px; background: var(--panel-bg); padding: 8px; border-radius: 8px; text-align: center; border-bottom: 3px solid #8a2be2; }
        .drop-card img { width: 50px; height: 50px; object-fit: contain; }
        .drop-user { font-size: 10px; color: var(--text-muted); }

        /* Profil va Sozlamalar menyusi (Rasm 4 dagi kabi) */
        .profile-container { padding: 20px; display: none; }
        .active-page { display: block; }
        .avatar-circle { width: 80px; height: 80px; background: #232b36; border-radius: 50%; margin: 0 auto 10px auto; border: 2px solid var(--accent); }
        
        .menu-item { background: var(--panel-bg); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .toggle-btn { width: 44px; height: 24px; background: #2c3542; border-radius: 12px; position: relative; cursor: pointer; }
        .toggle-btn.on { background: var(--accent); }
        .toggle-btn::after { content:''; position:absolute; width:20px; height:20px; background:#fff; border-radius:50%; top:2px; left:2px; transition: 0.2s; }
        .toggle-btn.on::after { left: 22px; }

        /* Navigatsiya */
        .nav-bar { position: fixed; bottom: 0; width: 100%; background: var(--panel-bg); display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #1e2530; }
        .nav-item { color: var(--text-muted); cursor: pointer; font-size: 14px; font-weight: 600; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <!-- LIVE DROPS (JONLI YUTUQLAR) -->
    <div class="live-drops" id="liveDrops"></div>

    <!-- MAIN PAGE -->
    <div id="page-main" class="profile-container active-page">
        <h2 style="text-align: center; color: var(--accent);">SkinFights</h2>
        <div style="text-align:center; font-size: 24px; margin: 20px 0;">Баланс: <span id="user-balance" style="color:var(--accent)">5000</span> 🪙</div>
        <button onclick="openCase()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; font-weight:700; font-size:16px;">Открыть Кейс (500 🪙)</button>
    </div>

    <!-- PROFIL & SETTINGS PAGE (Rasm 4 dagi aniq ko'rinish) -->
    <div id="page-profile" class="profile-container">
        <div class="avatar-circle"></div>
        <h3 style="text-align:center;" id="prof-username">yejjusi</h3>
        
        <div class="menu-item">
            <span>Change Language</span>
            <span style="color: var(--accent)" onclick="toggleLang()">Русский</span>
        </div>
        <div class="menu-item">
            <span>Включить звуки</span>
            <div class="toggle-btn on" id="soundToggle" onclick="toggleSetting('sound')"></div>
        </div>
        <div class="menu-item">
            <span>Включить вибрацию</span>
            <div class="toggle-btn" id="vibroToggle" onclick="toggleSetting('vibro')"></div>
        </div>
        <div class="menu-item" onclick="setTradeLink()">
            <span>Trade Link</span>
            <span style="color: var(--text-muted)">➔</span>
        </div>
    </div>

    <!-- BOTTOM NAVIGATION -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="navigate('page-main', this)">Игры</div>
        <div class="nav-item" onclick="navigate('page-profile', this)">Профиль</div>
    </div>

    <script>
        const TG_ID = "5498016172"; // Real foydalanuvchi IDsi
        const BACKEND_URL = "http://localhost:3000/api";

        async function initApp() {
            let res = await fetch(`${BACKEND_URL}/user/init`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ tg_id: TG_ID, username: "yejjusi" })
            });
            let data = await res.json();
            if(data.success) {
                document.getElementById('user-balance').innerText = data.user.balance;
                renderLiveDrops(data.liveDrops);
            }
        }

        async function openCase() {
            let res = await fetch(`${BACKEND_URL}/case/open`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ tg_id: TG_ID, casePrice: 500 })
            });
            let data = await res.json();
            if(data.success) {
                document.getElementById('user-balance').innerText = data.balance;
                alert(`Вы выбили: ${data.wonSkin.name}`);
                renderLiveDrops(data.liveDrops);
            } else {
                alert(data.error);
            }
        }

        function renderLiveDrops(drops) {
            const container = document.getElementById('liveDrops');
            container.innerHTML = drops.map(d => `
                <div class="drop-card">
                    <img src="https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsV4Wd86K7IOsKz07o6I9dBVjSl0VddMTM3o6jc6Wgg8vEh9XQ13SD46_R4paOf76S_C_c8bXIn50YwI9vOf1dQh00vXHeTJD7N20wIPcyqOsZ-vXwzsBuMcg3bHFrIn3jALt-EA5YWGhLI_Adg44ZAnYr1fslb_ugcfT7s6b6" alt="skin">
                    <div style="font-size:11px; font-weight:700;">${d.skin.split(' | ')[0]}</div>
                    <div class="drop-user">@${d.user}</div>
                </div>
            `).join('');
        }

        function navigate(pageId, element) {
            document.querySelectorAll('.profile-container').forEach(p => p.style.display = 'none');
            document.getElementById(pageId).style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
        }

        function toggleSetting(type) {
            let el = type === 'sound' ? document.getElementById('soundToggle') : document.getElementById('vibroToggle');
            el.classList.toggle('on');
            // Backendga sozlamani saqlash so'rovi yuboriladi...
        }

        function setTradeLink() {
            let link = prompt("Введите вашу Trade Link:");
            if(link) alert("Trade Link успешно сохранен!");
        }

        window.onload = initApp;
    </script>
</body>
</html>
